<!DOCTYPE html>
<html>
<head>
  <title>REST API PIN Generator</title>
</head>
<body style="text-align:center;font-family:Arial;margin-top:80px;">

<h1>REST API</h1>
<h3>GET /generate-pin</h3>

<button onclick="callAPI()">Generate PIN</button>

<pre id="output">---</pre>

<script>
/**
 * Generate 4-digit PIN
 */
function generatePin() {
  return Math.floor(1000 + Math.random() * 9000);
}

/**
 * REST API simulation returning JSON response
 */
function apiRequest(url) {

  if (url === "/generate-pin") {

    return {
      success: true,
      status: 200,
      endpoint: "/generate-pin",
      res: {
        pin: generatePin()
      }
    };
  }

  return {
    success: false,
    status: 404,
    res: {
      error: "Not Found"
    }
  };
}

/**
 * Call REST API
 */
function callAPI() {

  const url = "/generate-pin";

  const response = apiRequest(url);

  document.getElementById("output").innerText =
    JSON.stringify(response, null, 2);
}
</script>

</body>
</html>
